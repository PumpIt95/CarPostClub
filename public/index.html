<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#fafafa">
  <meta name="application-name" content="CarPostClub">
  <meta name="description" content="Vehicle media intake, team chat, upload history, and listing copy for fast-moving inventory teams.">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="CarPostClub">
  <meta property="og:type" content="website">
  <meta property="og:title" content="CarPostClub">
  <meta property="og:description" content="Vehicle media intake, team chat, upload history, and listing copy for inventory teams.">
  <meta property="og:image" content="/share-card.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="CarPostClub">
  <meta name="twitter:description" content="Vehicle media intake, team chat, upload history, and listing copy for inventory teams.">
  <meta name="twitter:image" content="/share-card.png">
  <title>CarPostClub</title>
  <link rel="icon" href="/favicon.png" type="image/png">
  <link rel="apple-touch-icon" href="/icons/carpostclub-apple-touch-icon.png">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="preload" as="image" href="/icons/carpostclub-icon-192.png">
  <link rel="stylesheet" href="/styles.css?v=20260604-album-media-v30">
</head>
<body>
  <main class="app-shell">
    <header class="app-header">
      <div class="brand-block">
        <span class="brand-mark" aria-hidden="true">
          <img src="/icons/carpostclub-icon-192.png" alt="">
        </span>
        <div>
          <p id="pageEyebrow" class="eyebrow">CarPostClub / Media</p>
          <h1 id="pageTitle">Vehicle media intake</h1>
        </div>
      </div>
      <div class="header-actions">
        <a id="uploadPageLink" class="icon-button subtle page-nav-link" href="/" aria-label="Home" title="Home" hidden>
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="m3 10 9-7 9 7"/>
            <path d="M5 9v11h14V9"/>
            <path d="M9 20v-7h6v7"/>
          </svg>
        </a>
        <button id="installButton" class="icon-button subtle" type="button" aria-label="Install app" title="Install app" hidden>
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 3v12"/>
            <path d="m7 10 5 5 5-5"/>
            <path d="M5 21h14"/>
          </svg>
        </button>
        <button id="notificationButton" class="icon-button subtle notification-toggle" type="button" aria-label="Turn on notifications" title="Turn on notifications" disabled>
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M18 8a6 6 0 0 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9"/>
            <path d="M13.7 21a2 2 0 0 1-3.4 0"/>
          </svg>
        </button>
        <a id="galleryPageLink" class="icon-button subtle page-nav-link" href="/gallery" aria-label="Open media gallery" title="Media gallery">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <rect x="3" y="5" width="18" height="14" rx="1"/>
            <path d="m8 13 2.5-3 3.5 4 2-2.5 3 3.5"/>
            <circle cx="8" cy="9" r="1"/>
          </svg>
        </a>
        <a class="icon-button subtle" href="/account/password" aria-label="Change password" title="Change password">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="8" cy="15" r="4"/>
            <path d="M10.8 12.2 21 2"/>
            <path d="m16 7 2 2"/>
            <path d="m18 5 2 2"/>
          </svg>
        </a>
        <a id="adminUsersLink" class="icon-button subtle" href="/admin/users" aria-label="Manage users" title="Manage users" hidden>
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="m16 11 2 2 4-4"/>
          </svg>
        </a>
        <button id="chatToggle" class="icon-button subtle chat-toggle" type="button" aria-label="Open chat" aria-controls="chatPanel" aria-expanded="false" title="Chat">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"/>
          </svg>
          <span id="chatUnread" class="chat-unread" hidden>0</span>
        </button>
        <form id="logoutForm" method="post" action="/logout">
          <button class="icon-button subtle" type="submit" aria-label="Sign out" title="Sign out">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
              <path d="M16 17l5-5-5-5"/>
              <path d="M21 12H9"/>
            </svg>
          </button>
        </form>
      </div>
    </header>

    <section id="statusBar" class="status-bar" hidden></section>

    <section class="picker-panel" aria-label="Choose car">
      <div class="section-heading">
        <div>
          <h2>Inventory source</h2>
          <p id="pickerSubhead">Choose from O'Regan's inventory.</p>
        </div>
        <div class="inventory-actions">
          <a id="sourceLink" class="source-link" href="https://www.oregans.com/inventory/" target="_blank" rel="noreferrer">Open Inventory on oregans.com</a>
        </div>
      </div>

      <div class="source-mode-switch" role="group" aria-label="Inventory source path">
        <button id="oregansSourceButton" class="source-mode-card is-active" type="button" aria-pressed="true">
          <span class="source-mode-kicker">Already listed</span>
          <strong>O'Regan's inventory</strong>
          <span>Pick lot, make, model, then inventory.</span>
        </button>
        <button id="addManualCarButton" class="source-mode-card" type="button" aria-pressed="false">
          <span class="source-mode-kicker">Not listed yet</span>
          <strong>Enter full details</strong>
          <span>Type year, price, km, colors, and specs.</span>
        </button>
      </div>

      <div class="picker-grid">
        <label class="field" for="inventoryTypeSelect">
          <span><strong>1</strong> New/Used</span>
          <select id="inventoryTypeSelect"></select>
        </label>

        <label class="field" for="dealershipSelect">
          <span><strong>2</strong> Lot</span>
          <select id="dealershipSelect"></select>
        </label>

        <label class="field" for="makeFilterSelect">
          <span><strong>3</strong> Make</span>
          <select id="makeFilterSelect" disabled>
            <option value="">Choose a make</option>
          </select>
        </label>

        <label class="field" for="modelFilterSelect">
          <span><strong>4</strong> Model</span>
          <select id="modelFilterSelect" disabled>
            <option value="">All models</option>
          </select>
        </label>

        <label class="field field-wide" for="carSelect">
          <span><strong>5</strong> Inventory <em id="carCount">0</em></span>
          <input id="carSearchInput" type="search" autocomplete="off" placeholder="Search stock, make, model, year, color, VIN, price, km">
          <select id="carSelect" disabled>
            <option value="">Choose a car</option>
          </select>
        </label>
      </div>

      <form id="manualCarForm" class="manual-car-form" hidden>
        <div class="manual-form-heading">
          <h3>Enter full vehicle details</h3>
          <button id="cancelManualCarButton" class="icon-button subtle" type="button" aria-label="Cancel manual car" title="Cancel">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M18 6 6 18"/>
              <path d="m6 6 12 12"/>
            </svg>
          </button>
        </div>

        <div class="manual-grid">
          <label class="field" for="manualInventoryTypeSelect">
            <span>New or used</span>
            <select id="manualInventoryTypeSelect" name="inventoryTypeId" required></select>
          </label>
          <label class="field" for="manualDealershipSelect">
            <span>Lot</span>
            <select id="manualDealershipSelect" name="dealershipId" required></select>
          </label>
          <label class="field" for="manualStockNumber">
            <span>Inventory number</span>
            <input id="manualStockNumber" name="stockNumber" autocomplete="off" required>
          </label>
          <label class="field" for="manualYear">
            <span>Year</span>
            <input id="manualYear" name="year" type="number" min="1980" max="2030" inputmode="numeric" required>
          </label>
          <label class="field" for="manualMake">
            <span>Make</span>
            <input id="manualMake" name="make" autocomplete="off" required>
          </label>
          <label class="field" for="manualModel">
            <span>Model</span>
            <input id="manualModel" name="model" autocomplete="off" required>
          </label>
          <label class="field" for="manualTrim">
            <span>Trim</span>
            <input id="manualTrim" name="trim" autocomplete="off">
          </label>
          <label class="field" for="manualPrice">
            <span>Price CAD</span>
            <input id="manualPrice" name="price" type="number" min="1" step="1" inputmode="numeric" required>
          </label>
          <label class="field" for="manualOdometer">
            <span>Kilometers</span>
            <input id="manualOdometer" name="odometer" type="number" min="0" step="1" inputmode="numeric" required>
          </label>
          <label class="field" for="manualExteriorColor">
            <span>Exterior color</span>
            <input id="manualExteriorColor" name="exteriorColor" autocomplete="off" required>
          </label>
          <label class="field" for="manualInteriorColor">
            <span>Interior color</span>
            <input id="manualInteriorColor" name="interiorColor" autocomplete="off">
          </label>
          <label class="field" for="manualBodyStyle">
            <span>Body style</span>
            <select id="manualBodyStyle" name="bodyStyle" required>
              <option value="">Choose body style</option>
              <option>SUV</option>
              <option>Sedan</option>
              <option>Truck</option>
              <option>Hatchback</option>
              <option>Coupe</option>
              <option>Convertible</option>
              <option>Wagon</option>
              <option>Minivan</option>
              <option>Other</option>
            </select>
          </label>
          <label class="field" for="manualFuelType">
            <span>Fuel type</span>
            <select id="manualFuelType" name="fuelType" required>
              <option value="">Choose fuel type</option>
              <option>Gasoline</option>
              <option>Hybrid</option>
              <option>Plug-in hybrid</option>
              <option>Electric</option>
              <option>Diesel</option>
              <option>Flex</option>
              <option>Other</option>
            </select>
          </label>
          <label class="field" for="manualTransmission">
            <span>Transmission</span>
            <select id="manualTransmission" name="transmission" required>
              <option value="">Choose transmission</option>
              <option>Automatic transmission</option>
              <option>Manual transmission</option>
            </select>
          </label>
          <label class="field" for="manualVin">
            <span>VIN</span>
            <input id="manualVin" name="vin" autocomplete="off">
          </label>
          <label class="field manual-wide" for="manualDescriptionPreview">
            <span>Highlights</span>
            <textarea id="manualDescriptionPreview" name="descriptionPreview" rows="3"></textarea>
          </label>
        </div>

        <div class="manual-form-actions">
          <button class="icon-text-button" type="submit">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M20 6 9 17l-5-5"/>
            </svg>
            <span>Save car</span>
          </button>
        </div>
      </form>
    </section>

    <section class="upload-panel" aria-label="Upload media">
      <input id="fileInput" type="file" accept="image/*,video/*,.heic,.heif,.m4v,.mov,.mp4,.ogv,.webm" multiple hidden>
      <input id="cameraInput" type="file" accept="image/*,.heic,.heif" capture="environment" hidden>
      <input id="videoInput" type="file" accept="video/*,.m4v,.mov,.mp4,.ogv,.webm" capture="environment" hidden>

      <button id="dropZone" class="upload-primary" type="button" disabled>
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 16V4"/>
          <path d="M7 9l5-5 5 5"/>
          <path d="M20 16.5V19a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-2.5"/>
        </svg>
        <span>
          <strong>Upload media</strong>
          <small id="uploadHint">Select a car first</small>
        </span>
      </button>

      <button id="cameraButton" class="upload-secondary" type="button" disabled>
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M4 8.5A2.5 2.5 0 0 1 6.5 6H8l1.2-1.6A1 1 0 0 1 10 4h4a1 1 0 0 1 .8.4L16 6h1.5A2.5 2.5 0 0 1 20 8.5v8a2.5 2.5 0 0 1-2.5 2.5h-11A2.5 2.5 0 0 1 4 16.5z"/>
          <circle cx="12" cy="12.5" r="3.25"/>
        </svg>
        <span>Photo</span>
      </button>

      <button id="videoButton" class="upload-secondary" type="button" disabled>
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="m22 8-6 4 6 4V8z"/>
          <rect x="2" y="6" width="14" height="12" rx="2"/>
        </svg>
        <span>Video</span>
      </button>

      <div class="upload-footer">
        <div id="uploadProgressShell" class="progress-shell" aria-hidden="true">
          <span id="uploadProgress" class="progress-fill"></span>
          <span class="upload-progress-marker">
            <img class="upload-monkey" src="/upload-monkey.svg" alt="" decoding="async">
          </span>
          <span class="progress-confetti">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
          </span>
        </div>
        <span id="uploadState" class="upload-state">Locked</span>
      </div>

      <div id="uploadRecovery" class="upload-recovery" hidden>
        <span id="uploadRecoveryMessage">Upload failed</span>
        <div>
          <button id="retryUploadButton" class="icon-text-button" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M20 7v5h-5"/>
              <path d="M4 17v-5h5"/>
              <path d="M18 12a6 6 0 0 0-10.4-4.1L4 11"/>
              <path d="M6 12a6 6 0 0 0 10.4 4.1L20 13"/>
            </svg>
            <span>Retry</span>
          </button>
          <button id="clearUploadButton" class="icon-text-button subtle" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M18 6 6 18"/>
              <path d="m6 6 12 12"/>
            </svg>
            <span>Clear</span>
          </button>
        </div>
      </div>
    </section>

    <section class="album-section" aria-label="Uploaded packages">
      <div class="section-heading">
        <div>
          <h2 id="albumSectionTitle">Album tiles</h2>
          <p id="albumSectionSubhead">Saved packages</p>
        </div>
        <button id="refreshButton" class="icon-button subtle" type="button" aria-label="Refresh inventory and albums" title="Refresh">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M20 7v5h-5"/>
            <path d="M4 17v-5h5"/>
            <path d="M18 12a6 6 0 0 0-10.4-4.1L4 11"/>
            <path d="M6 12a6 6 0 0 0 10.4 4.1L20 13"/>
          </svg>
        </button>
        <span id="albumCount" class="count-pill">0</span>
      </div>
      <div id="albumList" class="album-list"></div>
      <div id="albumEmpty" class="empty-state" hidden>No album tiles yet</div>
    </section>
  </main>

  <section id="chatPanel" class="chat-panel" aria-label="Team chat" aria-hidden="true" hidden>
    <header class="chat-header">
      <h2>Chat</h2>
      <button id="chatClose" class="chat-back-button icon-text-button subtle" type="button" aria-label="Back to dashboard" title="Back to dashboard">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M19 12H5"/>
          <path d="m12 19-7-7 7-7"/>
        </svg>
        <span>Dashboard</span>
      </button>
    </header>
    <div id="chatMessages" class="chat-messages" role="log" aria-live="polite" aria-relevant="additions"></div>
    <div id="chatEmpty" class="chat-empty">No messages yet</div>
    <form id="chatForm" class="chat-form">
      <label class="visually-hidden" for="chatInput">Message</label>
      <textarea id="chatInput" name="text" rows="2" maxlength="1000" placeholder="Message"></textarea>
      <button id="chatSend" class="icon-button" type="submit" aria-label="Send message" title="Send message">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="m22 2-7 20-4-9-9-4z"/>
          <path d="M22 2 11 13"/>
        </svg>
      </button>
    </form>
  </section>

  <script src="/app.js?v=20260604-album-media-v30" type="module"></script>
</body>
</html>
