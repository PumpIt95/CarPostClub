<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Monkey Face Emoji</title>
  <desc id="desc">An original cute monkey face emoji SVG with rounded ears, warm brown fur, tan muzzle, expressive eyes, and a small smile.</desc>

  <defs>
    <radialGradient id="fur" cx="34%" cy="26%" r="72%">
      <stop offset="0%" stop-color="#A76837"/>
      <stop offset="48%" stop-color="#7A431E"/>
      <stop offset="100%" stop-color="#4E2815"/>
    </radialGradient>
    <radialGradient id="earFur" cx="36%" cy="30%" r="68%">
      <stop offset="0%" stop-color="#9C5B2E"/>
      <stop offset="100%" stop-color="#4A2513"/>
    </radialGradient>
    <linearGradient id="face" x1="142" y1="126" x2="372" y2="418" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFD79D"/>
      <stop offset="58%" stop-color="#EBA75E"/>
      <stop offset="100%" stop-color="#D48945"/>
    </linearGradient>
    <radialGradient id="cheek" cx="50%" cy="42%" r="70%">
      <stop offset="0%" stop-color="#FFC88E"/>
      <stop offset="100%" stop-color="#DD8F4B"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#2D160B" flood-opacity="0.24"/>
    </filter>
  </defs>

  <!-- Ears -->
  <g filter="url(#softShadow)">
    <circle cx="111" cy="232" r="78" fill="url(#earFur)"/>
    <circle cx="401" cy="232" r="78" fill="url(#earFur)"/>
    <circle cx="111" cy="234" r="48" fill="#E7A15E" opacity="0.95"/>
    <circle cx="401" cy="234" r="48" fill="#E7A15E" opacity="0.95"/>
    <circle cx="111" cy="234" r="27" fill="#C77A42" opacity="0.38"/>
    <circle cx="401" cy="234" r="27" fill="#C77A42" opacity="0.38"/>
  </g>

  <!-- Head -->
  <path filter="url(#softShadow)" fill="url(#fur)" d="M256 68c95.1 0 172.2 75.7 172.2 169.1 0 104.7-75.4 190.9-172.2 190.9S83.8 341.8 83.8 237.1C83.8 143.7 160.9 68 256 68Z"/>

  <!-- Forehead shine -->
  <path d="M158.5 151.8C184.4 111.3 225.3 93 267.1 94.4c-38.3 9.8-70.2 32.9-93.1 67.7-22.1 33.4-31.3 70.9-27 108.8-20.8-40.4-16.5-75.3 11.5-119.1Z" fill="#B97842" opacity="0.34"/>

  <!-- Face mask -->
  <path fill="url(#face)" d="M255.7 168.2c-30.9-47.9-96.6-30.6-112.6 20.2-13.4 42.4 8.8 79.1 44.3 92.3-34.1 20.6-55.1 51.8-49.4 85.2 7.4 43.5 57.4 72.5 117.8 72.5s110.5-29 117.9-72.5c5.7-33.4-15.3-64.6-49.4-85.2 35.5-13.2 57.7-49.9 44.3-92.3-16.1-50.8-81.8-68.1-112.9-20.2Z"/>

  <!-- Muzzle -->
  <path fill="#F8C985" d="M179.7 326.1c0-39.5 35.6-71.5 76.3-71.5s76.3 32 76.3 71.5-34.2 73.8-76.3 73.8-76.3-34.3-76.3-73.8Z"/>
  <path fill="url(#cheek)" opacity="0.38" d="M190.8 340.8c16.2 29.1 39.1 43.7 65.2 43.7s49-14.6 65.2-43.7c-9.2 40-34.8 61-65.2 61s-56-21-65.2-61Z"/>

  <!-- Eyes -->
  <ellipse cx="204" cy="236" rx="21" ry="28" fill="#201008"/>
  <ellipse cx="308" cy="236" rx="21" ry="28" fill="#201008"/>
  <circle cx="197" cy="225" r="7.5" fill="#FFFFFF" opacity="0.92"/>
  <circle cx="301" cy="225" r="7.5" fill="#FFFFFF" opacity="0.92"/>
  <circle cx="211" cy="247" r="4" fill="#FFFFFF" opacity="0.28"/>
  <circle cx="315" cy="247" r="4" fill="#FFFFFF" opacity="0.28"/>

  <!-- Brows -->
  <path d="M179 197c16.4-12.1 35.4-12.1 51.6 0" fill="none" stroke="#3D1E0E" stroke-width="13" stroke-linecap="round" opacity="0.42"/>
  <path d="M281.4 197c16.2-12.1 35.2-12.1 51.6 0" fill="none" stroke="#3D1E0E" stroke-width="13" stroke-linecap="round" opacity="0.42"/>

  <!-- Nose and mouth -->
  <path d="M238.1 302.2c0-12.2 8.1-20 17.9-20s17.9 7.8 17.9 20c0 10.5-8 18.8-17.9 18.8s-17.9-8.3-17.9-18.8Z" fill="#6B351A"/>
  <path d="M256 320.2v15.6" fill="none" stroke="#6B351A" stroke-width="8" stroke-linecap="round"/>
  <path d="M219.4 348.6c11.2 17.3 29.4 25.4 36.6 25.4s25.4-8.1 36.6-25.4" fill="none" stroke="#6B351A" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Cheek dimples -->
  <circle cx="181" cy="302" r="13" fill="#C97645" opacity="0.22"/>
  <circle cx="331" cy="302" r="13" fill="#C97645" opacity="0.22"/>

  <!-- Tiny fur tufts -->
  <path d="M218 82c10.3-24.4 33.7-29.8 38-29.8 4.3 0 27.7 5.4 38 29.8-15.5-8.4-30.2-7.1-38-1.1-7.8-6-22.5-7.3-38 1.1Z" fill="#5A2D16"/>
  <path d="M237 76c6.9-16.1 16.7-20.5 19-20.5 2.3 0 12.1 4.4 19 20.5-8.3-4-14.4-3.3-19 0-4.6-3.3-10.7-4-19 0Z" fill="#7E4420" opacity="0.76"/>
</svg>
