name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '17 4 * * 1'

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze JavaScript
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
      - name: Initialize CodeQL
        uses: github/codeql-action/init@e4fba868f108ac4222129de456ea554034a27db7 # v4
        with:
          languages: javascript-typescript
      - name: Autobuild
        uses: github/codeql-action/autobuild@e4fba868f108ac4222129de456ea554034a27db7 # v4
      - name: Run CodeQL analysis
        uses: github/codeql-action/analyze@e4fba868f108ac4222129de456ea554034a27db7 # v4
        with:
          category: /language:javascript-typescript
